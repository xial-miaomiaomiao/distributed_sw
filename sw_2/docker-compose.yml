version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: product_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:6.2
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - app-network

  app1:
    build: .
    container_name: spring-app-1
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/product_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      - db
      - redis
    networks:
      - app-network

  app2:
    build: .
    container_name: spring-app-2
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/product_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      - db
      - redis
    networks:
      - app-network

  nginx:
    image: nginx:1.21
    container_name: nginx-load-balancer
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./static:/usr/share/nginx/html
    depends_on:
      - app1
      - app2
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data: