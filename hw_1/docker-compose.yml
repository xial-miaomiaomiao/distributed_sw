version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: distributed_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: distributed_db
    ports:
      - "3306:3306"
    volumes:
      - D:\DockerData\mysql:/var/lib/mysql
    networks:
      - distributed_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: distributed_redis
    ports:
      - "6379:6379"
    volumes:
      - D:\DockerData\redis:/data
    networks:
      - distributed_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务实例1 - 端口8081
  backend1:
    build: ./backend
    container_name: distributed_backend1
    environment:
      PORT: 8081
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - distributed_network

  # 后端服务实例2 - 端口8082
  backend2:
    build: ./backend
    container_name: distributed_backend2
    environment:
      PORT: 8082
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - distributed_network

  # Nginx负载均衡
  nginx:
    image: nginx:alpine
    container_name: distributed_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html:ro
    depends_on:
      - backend1
      - backend2
    networks:
      - distributed_network

networks:
  distributed_network:
    driver: bridge
