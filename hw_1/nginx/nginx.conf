worker_processes auto;
error_log "C:/Nginx/logs/error.log" warn;
pid "C:/Nginx/logs/nginx.pid";

events {
    worker_connections 1024;
}

http {
    include "C:/Nginx/conf/mime.types";
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr';

    access_log "C:/Nginx/logs/access.log" main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # 临时目录配置
    client_body_temp_path "C:/Nginx/temp/client_body_temp";
    proxy_temp_path "C:/Nginx/temp/proxy_temp";
    fastcgi_temp_path "C:/Nginx/temp/fastcgi_temp";
    uwsgi_temp_path "C:/Nginx/temp/uwsgi_temp";
    scgi_temp_path "C:/Nginx/temp/scgi_temp";

    # 后端服务集群 - 轮询算法（默认）
    upstream backend_cluster {
        server localhost:8081 weight=1;
        server localhost:8082 weight=1;
    }

    # 后端服务集群 - 权重算法
    upstream backend_weighted {
        server localhost:8081 weight=3;
        server localhost:8082 weight=1;
    }

    # 后端服务集群 - IP哈希算法
    upstream backend_ip_hash {
        ip_hash;
        server localhost:8081;
        server localhost:8082;
    }

    server {
        listen 80;
        server_name localhost;

        # 静态文件目录（动静分离）
        location / {
            root D:\AAAAAA\distributed_sw\distributed_sw\hw_1\static;
            index index.html index.htm;
            try_files $uri $uri/ =404;
        }

        # 静态资源缓存（CSS、JS、图片等）
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
            root D:\AAAAAA\distributed_sw\distributed_sw\hw_1\static;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # API请求转发到后端（轮询算法）
        location /api/ {
            proxy_pass http://backend_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时设置
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # 权重算法测试路径
        location /api/weighted/ {
            rewrite ^/api/weighted/(.*)$ /api/$1 break;
            proxy_pass http://backend_weighted;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # IP哈希算法测试路径
        location /api/iphash/ {
            rewrite ^/api/iphash/(.*)$ /api/$1 break;
            proxy_pass http://backend_ip_hash;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 健康检查
        location /nginx-health {
            access_log off;
            return 200 "Nginx is running\n";
            add_header Content-Type text/plain;
        }
    }
}
